<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Projet lot N°9 Ouest Frais</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f2a3d;
color:white;
text-align:center;
}

/* HEADER */
header{
padding:40px;
background:#16324f;
}

/* MENU */
.menu button{
margin:10px;
padding:15px;
border:none;
border-radius:10px;
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

/* SECTION */
.section{
display:none;
padding:40px;
max-width:1200px;
margin:auto;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
margin:20px 0;
}

/* IMAGE */
img{
max-width:60%;
margin:20px auto;
display:block;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* RETOUR */
.back{
background:red;
color:white;
padding:10px;
border:none;
margin-top:20px;
}

</style>
</head>

<body>

<header>
<h1>Projet lot N°9 Ouest Frais</h1>
</header>

<!-- MENU PRINCIPAL -->
<div class="menu">
<button onclick="show('accueil')">Accueil</button>
<button onclick="show('commun')">Partie commune</button>
<button onclick="show('candidats')">Candidats</button>
</div>

<!-- ACCUEIL -->
<div id="accueil" class="section" style="display:block;">
<div class="card">
<h2>Présentation</h2>
<p>👉 colle ton texte client ici</p>
<img src="carte.png">
</div>
</div>

<!-- PARTIE COMMUNE -->
<div id="commun" class="section">

<div class="card">
<h2>Schéma de principe</h2>
<img src="schema-principe-rtap.png" style="transform:rotate(-90deg); width:50%;">
</div>

<div class="card">
<h2>Nomenclature</h2>
<img src="nomenclature-rtap.png" style="transform:rotate(-90deg); width:50%;">
</div>

<div class="card">
<h2>Diagramme enthalpique</h2>
<img src="diagramme-enthalpie.png">
</div>

<div class="card">
<h2>Comparaison fluides</h2>
<div class="grid">
<img src="tableau-r1234ze.png">
<img src="tableau-co2.png">
<img src="tableau-nh3.png">
<img src="tableau-r290.png">
</div>
</div>

<button class="back" onclick="show('accueil')">Retour</button>

</div>

<!-- CANDIDATS -->
<div id="candidats" class="section">

<div class="menu">
<button onclick="show('maxime')">Candidat N°1</button>
<button>Candidat N°2</button>
<button>Candidat N°3</button>
<button>Candidat N°4</button>
</div>

<button class="back" onclick="show('accueil')">Retour</button>

</div>

<!-- MAXIME -->
<div id="maxime" class="section">

<div class="menu">
<button onclick="showSub('bilan')">Bilan</button>
<button onclick="showSub('formules')">Formules</button>
<button onclick="showSub('pompes')">Pompes</button>
<button onclick="showSub('elec')">Élec</button>
<button onclick="showSub('regul')">Régulation</button>
<button onclick="showSub('devis')">Devis</button>
</div>

<div id="bilan" class="card sub">
<h2>Bilan frigorifique</h2>
<img src="bilan-frigo.png">
<img src="bilan-detail.png">
</div>

<div id="formules" class="card sub">
<h2>Formules</h2>
<img src="formule-chaud.png">
<img src="formule-froid.png">
<img src="kv.png">
</div>

<div id="pompes" class="card sub">
<h2>Pompes</h2>
<img src="pompe-chaud-gf1.png">
<img src="pompe-froid-gf1.png">
</div>

<div id="elec" class="card sub">
<h2>Schémas électriques</h2>
<img src="schema-elec-gf1.png" style="transform:rotate(-90deg);">
</div>

<div id="regul" class="card sub">
<h2>Régulation</h2>
<img src="schema-regul.png" style="transform:rotate(-90deg);">
</div>

<div id="devis" class="card sub">
<h2>Devis</h2>
<img src="tableau-regle-1.png">
<img src="tableau-regle-2.png">
</div>

<button class="back" onclick="show('candidats')">Retour</button>

</div>

<script>

function show(id){
document.querySelectorAll('.section').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function showSub(id){
document.querySelectorAll('.sub').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

</script>

</body>
</html>
