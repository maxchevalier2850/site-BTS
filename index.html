<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Projet lot N°9 Ouest Frais</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f2a3d;
color:white;
text-align:center;
}

/* HEADER */
header{
padding:40px;
background:#16324f;
}

/* MENU */
.menu{
margin-top:20px;
}

.menu button{
margin:10px;
padding:15px 25px;
border:none;
border-radius:10px;
background:#00d4ff;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.menu button:hover{
background:white;
}

/* SECTIONS */
.section{
display:none;
padding:40px;
max-width:1200px;
margin:auto;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
margin:20px 0;
}

/* IMAGES */
img{
max-width:60%;
margin:20px auto;
display:block;
border-radius:10px;
}

/* RETOUR */
.back{
margin-top:20px;
padding:10px 20px;
background:#ff4d4d;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Projet lot N°9 Ouest Frais</h1>
<img src="logo-ouestfrais.png" style="width:200px;">
</header>

<!-- MENU PRINCIPAL -->
<div class="menu">
<button onclick="show('accueil')">🏠 Accueil</button>
<button onclick="show('commun')">📁 Partie commune</button>
<button onclick="show('candidats')">👷 Candidats</button>
</div>

<!-- ACCUEIL -->
<div id="accueil" class="section" style="display:block;">

<div class="card">
<h2>Présentation du projet</h2>
<p>
Ouest Frais est une entreprise spécialisée dans la distribution alimentaire...
</p>
<img src="carte.png">
</div>

</div>

<!-- PARTIE COMMUNE -->
<div id="commun" class="section">

<div class="card">
<h2>Schéma de principe</h2>
<img src="schema-principe-rtap.png" style="transform:rotate(-90deg); width:50%;">
</div>

<div class="card">
<h2>Nomenclature</h2>
<img src="nomenclature-rtap.png" style="transform:rotate(-90deg); width:50%;">
</div>

<div class="card">
<h2>Tableaux fluides</h2>
<img src="tableau-r1234ze.png">
<img src="tableau-co2.png">
</div>

<button class="back" onclick="show('accueil')">⬅ Retour</button>

</div>

<!-- CANDIDATS -->
<div id="candidats" class="section">

<div class="menu">
<button onclick="show('maxime')">Candidat N°1</button>
<button>Candidat N°2</button>
<button>Candidat N°3</button>
<button>Candidat N°4</button>
</div>

<button class="back" onclick="show('accueil')">⬅ Retour</button>

</div>

<!-- MAXIME -->
<div id="maxime" class="section">

<div class="card">
<h2>Bilan frigorifique</h2>
<img src="bilan-frigo.png">
<img src="bilan-detail.png">
</div>

<div class="card">
<h2>Formules</h2>
<img src="formule-chaud.png">
<img src="formule-froid.png">
</div>

<div class="card">
<h2>Pompes</h2>
<img src="pompe-chaud-gf1.png">
<img src="pompe-froid-gf1.png">
</div>

<button class="back" onclick="show('candidats')">⬅ Retour</button>

</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(sec=>{
sec.style.display="none";
});
document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
