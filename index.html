<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Projet lot N°9 Ouest Frais</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0f2a3d;color:white;text-align:center;}

header{padding:40px;background:#16324f;}

.menu button{
margin:10px;
padding:15px;
border:none;
border-radius:10px;
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

.section{
display:none;
padding:40px;
max-width:1200px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
margin:20px 0;
opacity:0;
transform:translateY(40px);
transition:0.6s;
}

.card.visible{
opacity:1;
transform:translateY(0);
}

img{
max-width:60%;
margin:20px auto;
display:block;
border-radius:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.back{
background:red;
color:white;
padding:10px;
border:none;
margin-top:20px;
}

/* ZOOM */
.zoom-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.zoom-overlay img{
max-width:90%;
max-height:90%;
}

/* DEVIS */
.devis-box{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

.devis-img{
max-width:65%;
border-radius:10px;
transition:0.3s;
}

.devis-img:hover{
transform:scale(1.03);
}

.btn-devis{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#00d4ff;
color:black;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.analyse{
max-width:700px;
margin:30px auto;
font-size:14px;
color:#ddd;
line-height:1.6;
}
</style>
</head>

<body>

<header>
<h1>Projet lot N°9 Ouest Frais</h1>
<img src="logo-ouestfrais.png" style="width:200px;">
</header>

<div class="menu">
<button onclick="show('accueil')">Accueil</button>
<button onclick="show('commun')">Partie commune</button>
<button onclick="show('candidats')">Candidats</button>
<button onclick="show('dossier')">Dossier technique</button>
</div>

<!-- ACCUEIL -->
<div id="accueil" class="section" style="display:block;">
<div class="card">
<h2>Présentation du client</h2>
<p>Ouest Frais est une entreprise spécialisée dans la distribution alimentaire située à Montaigu.</p>
<img src="carte.png">
</div>
</div>

<!-- PARTIE COMMUNE -->
<div id="commun" class="section">

<div class="card">
<h2>Bilan frigorifique</h2>
<div class="grid">
<img src="bilan-frigo.png">
<img src="bilan-detail.png">
</div>
</div>

<div class="card">
<h2>Comparaison des fluides</h2>
<div class="grid">
<img src="tableau-r1234ze.png">
<img src="tableau-nh3.png">
<img src="tableau-r290.png">
<img src="tableau-co2.png">
</div>
</div>

<div class="card">
<h2>Réglementation</h2>
<div class="grid">
<img src="tableau-hfo.png">
<img src="tableau-regle-1.png">
<img src="tableau-regle-2.png">
</div>
</div>

<button class="back" onclick="show('accueil')">Retour</button>
</div>

<!-- CANDIDATS -->
<div id="candidats" class="section">

<div class="menu">
<button onclick="show('maxime')">Candidat N°1</button>
</div>

<button class="back" onclick="show('accueil')">Retour</button>
</div>

<!-- MAXIME -->
<div id="maxime" class="section">

<div class="menu">
<button onclick="showSub('schema')">Schéma</button>
<button onclick="showSub('formules')">Formules</button>
<button onclick="showSub('pompes')">Pompes</button>
<button onclick="showSub('elec')">Élec</button>
<button onclick="showSub('regul')">Régulation</button>
<button onclick="showSub('devis')">Devis</button>
</div>

<div id="schema" class="card sub">
<h2>Schéma</h2>
<img src="schema-principe-rtap.png">
</div>

<div id="formules" class="card sub">
<h2>Formules</h2>
<img src="formule-chaud.png">
</div>

<div id="pompes" class="card sub">
<h2>Pompes</h2>
<img src="pompe-chaud-gf1.png">
</div>

<div id="elec" class="card sub">
<h2>Électricité</h2>
<img src="schema-elec-gf1.png">
</div>

<div id="regul" class="card sub">
<h2>Régulation</h2>
<img src="schema-regul.png">
</div>

<div id="devis" class="card sub">
<h2>Devis</h2>
<div class="devis-box">
<img src="devis.png" class="devis-img">
</div>
</div>

<button class="back" onclick="show('candidats')">Retour</button>
</div>

<!-- DOSSIER TECHNIQUE -->
<div id="dossier" class="section">

<div class="menu">
<button onclick="showSubDoc('gf')">Groupes froids</button>
<button onclick="showSubDoc('pompes-doc')">Pompes</button>
<button onclick="showSubDoc('ballon')">Ballon</button>
<button onclick="showSubDoc('tuyaux')">Tuyauterie</button>
<button onclick="showSubDoc('vanne-ta')">Vanne TA</button>
<button onclick="showSubDoc('controleur')">Contrôleur</button>
<button onclick="showSubDoc('isolement')">Isolement</button>
</div>

<div id="pompes-doc" class="card subdoc">
<h2>Pompes</h2>

<h3>Chaud</h3>
<img src="pompe-chaud-gf1.png">
<img src="pompe-chaud-gf2.png">

<h3>Froid</h3>
<img src="pompe-froid-gf1.png">
<img src="pompe-froid-gf2.png">
</div>

<button class="back" onclick="show('accueil')">Retour</button>
</div>

<!-- ZOOM -->
<div id="zoom" class="zoom-overlay" onclick="closeZoom()">
<img id="zoom-img">
</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function showSub(id){
document.querySelectorAll('.sub').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function showSubDoc(id){
document.querySelectorAll('.subdoc').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function openZoom(src){
document.getElementById("zoom").style.display="flex";
document.getElementById("zoom-img").src=src;
}

function closeZoom(){
document.getElementById("zoom").style.display="none";
}

document.querySelectorAll("img").forEach(img=>{
img.addEventListener("click",()=>{
openZoom(img.src);
});
});
</script>

</body>
</html>
